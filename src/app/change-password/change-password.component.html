<div class="min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-[#1A4E79] to-[#75C9C8]">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md flex flex-col items-center">

    <img src="assets/logo.png" alt="Logo" class="h-14 mb-4" />

    <div *ngIf="!sucesso">
      <div class="flex flex-col items-center mb-6">
        <div class="bg-amber-100 border border-amber-400 rounded-xl px-4 py-3 flex items-start gap-3 w-full">
          <svg class="w-5 h-5 text-amber-500 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
          </svg>
          <div>
            <p class="text-amber-800 font-semibold text-sm">Senha expirada</p>
            <p class="text-amber-700 text-sm mt-0.5">
              Sua senha expirou. Defina uma nova senha para continuar.
            </p>
          </div>
        </div>

        <p class="text-[#1A4E79] font-medium mt-4 text-sm">
          Usuário: <span class="font-bold">{{ username }}</span>
        </p>
      </div>

      <form class="w-full flex flex-col gap-4" (ngSubmit)="submit()">

        <div class="relative">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
            placeholder="Nova senha"
            class="w-full border border-[#75C9C8] rounded-lg px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-[#75C9C8]"
          />
          <button
            type="button"
            (click)="showNewPassword = !showNewPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
            tabindex="-1"
          >
            <svg *ngIf="!showNewPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg *ngIf="showNewPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </button>
        </div>

        <div class="relative">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            placeholder="Confirmar nova senha"
            class="w-full border border-[#75C9C8] rounded-lg px-4 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-[#75C9C8]"
          />
          <button
            type="button"
            (click)="showConfirmPassword = !showConfirmPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
            tabindex="-1"
          >
            <svg *ngIf="!showConfirmPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg *ngIf="showConfirmPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </button>
        </div>

        <div *ngIf="erro" class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-2 text-sm">
          {{ erro }}
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="bg-[#1A4E79] text-white rounded-lg py-2 font-semibold hover:bg-[#75C9C8] transition disabled:opacity-50"
        >
          <span *ngIf="!loading">Alterar senha</span>
          <span *ngIf="loading">Aguarde...</span>
        </button>

        <button
          type="button"
          (click)="voltar()"
          class="text-[#1A4E79] text-sm underline hover:text-[#75C9C8] transition"
        >
          Voltar ao login
        </button>
      </form>
    </div>

    <div *ngIf="sucesso" class="flex flex-col items-center gap-4 py-4">
      <div class="bg-green-100 border border-green-400 rounded-xl px-6 py-5 flex flex-col items-center gap-2 text-center">
        <svg class="w-10 h-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-green-800 font-semibold">Senha alterada com sucesso!</p>
        <p class="text-green-700 text-sm">Redirecionando para o login...</p>
      </div>
    </div>

  </div>
</div>
